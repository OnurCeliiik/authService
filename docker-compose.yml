services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 5
  test-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service_test
    ports:
      - 5434:5432
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP - app sends here
      - "8025:8025" # Web UI - for email inspection

  api:
    build: .
    ports:
      - 8080:8080
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_service?sslmode=disable
      JWT_SECRET: dev-only-change-me-in-production
      JWT_TTL: 15m
      REFRESH_TOKEN_TTL: 168h
      APP_BASE_URL: http://localhost:8080
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@authservice.local
      EXPOSE_RESET_TOKEN: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/oauth/google/callback}
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  postgres_data:
  test_postgres_data: