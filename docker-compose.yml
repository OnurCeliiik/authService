services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 5s
      timeout: 5s
      retries: 5
  test-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service_test
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/test_data

  api:
    build: .
    ports:
      - 8080:8080
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_service?sslmode=disable
      JWT_SECRET: dev-only-change-me-in-production
      JWT_TTL: 24h
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: